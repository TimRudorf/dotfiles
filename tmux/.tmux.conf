# Extended keys / Kitty-Keyboard-Protokoll an Panes weiterreichen.
# Ohne das kodieren Apps wie Claude Code ctrl+b als CSI-u-Sequenz
# (\x1b[98;5u) statt als rohes 0x02 — dann erkennt tmux den Prefix nicht mehr.
# "always" reicht die Extended-Keys unbedingt durch und hält ctrl+b als Prefix
# funktionsfähig, ohne Shift+Enter & Co. in Claude Code zu opfern.
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# --- Plugin-Manager -------------------------------------------------------
# TPM verwaltet die unten deklarierten Plugins.
set -g @plugin 'tmux-plugins/tpm'

# --- Catppuccin Mocha Theme ----------------------------------------------
# Statuszeile im Catppuccin-Look (passend zum systemweiten Mocha-Theme).
# Tag gepinnt (v2.3.0), damit TPM-Updates nicht ungefragt brechen — siehe
# https://github.com/catppuccin/tmux/tags fuer neuere Versionen.
set -g @plugin 'catppuccin/tmux#v2.3.0'

# Datenquellen fuer die cpu-/ram-/battery-Statusmodule von Catppuccin.
set -g @plugin 'tmux-plugins/tmux-cpu'      # liefert CPU- und RAM-Prozente
set -g @plugin 'tmux-plugins/tmux-battery'  # liefert Akkustand (MacBook)

# Catppuccin konfigurieren (muss vor dem TPM-run stehen, das das Theme laedt).
set -g @catppuccin_flavor 'mocha'                 # latte, frappe, macchiato, mocha
set -g @catppuccin_window_status_style 'rounded'  # abgerundete Fenster-Tabs

# RAM-Icon-Override: Catppuccin nutzt U+EFC5 (md-memory), das in der
# MesloLGS-NF-Subset-Font fehlt -> Tofu-Kästchen. nf-md-memory (U+F0EE0)
# ist im Font enthalten. Muss vor dem TPM-run stehen (Catppuccin setzt das
# Icon mit -ogq nur, falls noch nicht gesetzt).
set -g @catppuccin_ram_icon '󰻠 '

# Statuszeile: links leer, rechts die Catppuccin-Module.
# cpu/ram/battery brauchen den Format-Flag -F (-agF), weil ihr Wert selbst
# noch ineinander verschachtelte #{...}-Formatstrings enthaelt.
set -g status-right-length 120
set -g status-left-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_application}'
set -ag status-right '#{E:@catppuccin_status_session}'
set -agF status-right '#{E:@catppuccin_status_cpu}'
set -agF status-right '#{E:@catppuccin_status_ram}'
set -agF status-right '#{E:@catppuccin_status_battery}'
set -ag status-right '#{E:@catppuccin_status_uptime}'
set -ag status-right '#{E:@catppuccin_status_date_time}'

# TPM initialisieren — muss die letzte Zeile der Config sein.
run '~/.tmux/plugins/tpm/tpm'
