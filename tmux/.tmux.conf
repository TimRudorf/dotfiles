# Extended keys / Kitty-Keyboard-Protokoll an Panes weiterreichen.
# Ohne das kodieren Apps wie Claude Code ctrl+b als CSI-u-Sequenz
# (\x1b[98;5u) statt als rohes 0x02 — dann erkennt tmux den Prefix nicht mehr.
# "always" reicht die Extended-Keys unbedingt durch und hält ctrl+b als Prefix
# funktionsfähig, ohne Shift+Enter & Co. in Claude Code zu opfern.
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# --- Session-Persistenz über Reboots (resurrect + continuum) -------------
# resurrect speichert/restauriert Layout, Fenster, Panes und Arbeitsverzeichnisse
# auf Platte; continuum automatisiert das (Auto-Save alle 15 Min) und startet
# tmux auf macOS via LaunchAgent beim Login automatisch wieder hoch.
# Wiederhergestellt werden Layout, Verzeichnisse, der sichtbare Pane-Text sowie
# ausgewählte Programme (claude, ssh, tail -f).
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Catppuccin Mocha Theme ----------------------------------------------
# Statuszeile im Catppuccin-Look (passend zum systemweiten Mocha-Theme).
# Tag gepinnt (v2.3.0), damit TPM-Updates nicht ungefragt brechen — siehe
# https://github.com/catppuccin/tmux/tags fuer neuere Versionen.
set -g @plugin 'catppuccin/tmux#v2.3.0'

set -g @continuum-restore 'on'        # letzten Stand beim Server-Start wiederherstellen
set -g @continuum-boot 'on'           # macOS: LaunchAgent -> tmux startet beim Login
set -g @continuum-save-interval '15'  # Auto-Save-Intervall in Minuten

# Sichtbaren Pane-Inhalt mitsichern und beim Restore wieder ausgeben.
set -g @resurrect-capture-pane-contents 'on'
# Zusätzlich zu resurrects Default-Liste diese Programme wiederherstellen.
# "~claude": Tilde matcht "claude" irgendwo im Prozess-String und stellt die
# komplette gespeicherte Kommandozeile (inkl. Flags) wieder her.
set -g @resurrect-processes '"~claude" ssh "tail -f"'

# Catppuccin konfigurieren (muss vor dem TPM-run stehen, das das Theme laedt).
set -g @catppuccin_flavor 'mocha'                 # latte, frappe, macchiato, mocha
set -g @catppuccin_window_status_style 'rounded'  # abgerundete Fenster-Tabs

# Statuszeile: links leer, rechts abhaengigkeitsfreie Built-in-Module.
# (cpu/ram/battery-Module wuerden tmux-cpu bzw. tmux-battery voraussetzen.)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_application}'
set -ag status-right '#{E:@catppuccin_status_session}'
set -ag status-right '#{E:@catppuccin_status_uptime}'
set -ag status-right '#{E:@catppuccin_status_date_time}'

# TPM initialisieren — muss die letzte Zeile der Config sein.
run '~/.tmux/plugins/tpm/tpm'
