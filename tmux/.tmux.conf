# Extended keys / Kitty-Keyboard-Protokoll an Panes weiterreichen.
# Ohne das kodieren Apps wie Claude Code ctrl+b als CSI-u-Sequenz
# (\x1b[98;5u) statt als rohes 0x02 — dann erkennt tmux den Prefix nicht mehr.
# "always" reicht die Extended-Keys unbedingt durch und hält ctrl+b als Prefix
# funktionsfähig, ohne Shift+Enter & Co. in Claude Code zu opfern.
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# --- Session-Persistenz über Reboots (resurrect + continuum) -------------
# resurrect speichert/restauriert Layout, Fenster, Panes und Arbeitsverzeichnisse
# auf Platte; continuum automatisiert das (Auto-Save alle 15 Min) und startet
# tmux auf macOS via LaunchAgent beim Login automatisch wieder hoch.
# Bewusst schlank gehalten: nur Layout + Verzeichnisse, kein Pane-Text/keine Prozesse.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'        # letzten Stand beim Server-Start wiederherstellen
set -g @continuum-boot 'on'           # macOS: LaunchAgent -> tmux startet beim Login
set -g @continuum-save-interval '15'  # Auto-Save-Intervall in Minuten

# TPM initialisieren — muss die letzte Zeile der Config sein.
run '~/.tmux/plugins/tpm/tpm'
